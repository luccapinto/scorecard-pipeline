services:
  postgres:
    image: postgres:15-alpine
    container_name: scorecard-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: scorecard_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scorecard-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: scorecard-api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/scorecard_db
      REDIS_URL: redis://redis:6379/0
    command: sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        INSTALL_ML: "true"
    container_name: scorecard-worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_secure_pass}@postgres:5432/scorecard_db
      REDIS_URL: redis://redis:6379/0
    command: python run_worker.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # SPA built from source (frontend/) in a multi-stage image and served by
  # nginx. The API URL is NOT baked into the bundle: it is configured at
  # runtime in the UI (default http://localhost:8000) and stored in the
  # browser's localStorage. The API's CORS allowlist permits the
  # http://localhost:5173 origin.
  frontend:
    build: ./frontend
    container_name: scorecard-frontend
    restart: always
    ports:
      - "5173:80"

volumes:
  postgres_data:
