name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check --output-format=github .

      - name: Type check with mypy
        run: mypy

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks needs the full history to scan past commits.
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --strict

      - name: Scan history for leaked secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    # Single Python version on purpose: this is a deployed application, not a
    # library. CI matches the runtime of the Docker image (python:3.11-slim).
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scorecard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install system audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scorecard_test
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scorecard_test
          REDIS_URL: redis://localhost:6379/0
          # The suite mocks every provider; this only exercises the local
          # branch of the provider switch without needing API keys.
          TRANSCRIPTION_PROVIDER: local
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml \
                 --cov-fail-under=78

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The default docker driver cannot export GHA cache; buildx provides
      # the docker-container driver that can.
      - uses: docker/setup-buildx-action@v4

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: scorecard-api:ci
          # The ML extra pulls multi-gigabyte torch wheels; the API image
          # (INSTALL_ML=false) is what CI validates on every PR.
          build-args: INSTALL_ML=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A build that succeeds only proves the dependencies install. Run the
      # image to prove the application actually starts on this base image —
      # this is what catches a runtime-incompatible base bump (e.g. a new
      # Python line) that compiles fine but breaks on import.
      - name: Smoke test the image
        run: |
          docker run --rm scorecard-api:ci \
            python -c "import app.main; print('app imports OK')"
          docker run --rm scorecard-api:ci \
            alembic upgrade head --sql > /dev/null && echo "alembic offline OK"
