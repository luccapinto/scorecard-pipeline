[alembic]
script_location = alembic
# env.py imports app.models to register tables; make the repo root importable
# no matter where the `alembic` console script was installed.
prepend_sys_path = .
# sqlalchemy.url is resolved at runtime from DATABASE_URL (see alembic/env.py)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
